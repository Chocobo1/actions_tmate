name: Run
on: [pull_request, push]
permissions: {}

jobs:
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: Setup remote login (tmate)
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 60
        with:
          detached: true

  ubuntu:
    name: Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Setup remote login (tmate)
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 60
        with:
          detached: true

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Setup remote login (tmate)
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 60
        with:
          detached: true
